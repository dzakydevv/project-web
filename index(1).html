<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Rex Game with Button</title>
<style>
  body {
    margin: 0;
    background: #f7f7f7;
    overflow: hidden;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #game {
    position: relative;
    width: 100vw;
    height: 200px;
    border-bottom: 2px solid #333;
    background: #fff;
    margin-bottom: 20px;
  }
  #rex {
    position: absolute;
    bottom: 0;
    left: 50px;
    width: 40px;
    height: 40px;
    background: green;
  }
  .obstacle {
    position: absolute;
    bottom: 0;
    width: 20px;
    height: 40px;
    background: brown;
  }
  #jumpBtn {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="game">
  <div id="rex"></div>
</div>
<button id="jumpBtn">Jump</button>

<script>
const rex = document.getElementById('rex');
const game = document.getElementById('game');
const jumpBtn = document.getElementById('jumpBtn');
let isJumping = false;
let rexBottom = 0;

// Jump function
function jump() {
  if(isJumping) return;
  isJumping = true;
  let upInterval = setInterval(() => {
    if(rexBottom >= 100) {
      clearInterval(upInterval);
      let downInterval = setInterval(() => {
        if(rexBottom <= 0) {
          clearInterval(downInterval);
          isJumping = false;
        }
        rexBottom -= 5;
        rex.style.bottom = rexBottom + 'px';
      }, 20);
    }
    rexBottom += 5;
    rex.style.bottom = rexBottom + 'px';
  }, 20);
}

// Create obstacles
function createObstacle() {
  const obstacle = document.createElement('div');
  obstacle.classList.add('obstacle');
  let obstacleLeft = window.innerWidth;
  obstacle.style.left = obstacleLeft + 'px';
  game.appendChild(obstacle);

  let moveObstacle = setInterval(() => {
    obstacleLeft -= 5;
    obstacle.style.left = obstacleLeft + 'px';

    // Collision detection
    if(obstacleLeft < 90 && obstacleLeft > 50 && rexBottom < 40) {
      alert('Game Over!');
      window.location.reload();
    }

    if(obstacleLeft < -20) {
      clearInterval(moveObstacle);
      game.removeChild(obstacle);
    }
  }, 20);

  // Random next obstacle
  setTimeout(createObstacle, Math.random() * 3000 + 1000);
}

// Button listener
jumpBtn.addEventListener('click', jump);

// Optional: keyboard listener
document.addEventListener('keydown', (e) => {
  if(e.code === 'Space') jump();
});

// Start game
createObstacle();
</script>
</body>
</html>
